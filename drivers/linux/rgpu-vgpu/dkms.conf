# DKMS configuration for RGPU Virtual GPU kernel module
#
# DKMS (Dynamic Kernel Module Support) automatically rebuilds this
# module whenever the kernel is updated.
#
# Installation:
#   sudo cp -r drivers/linux/rgpu-vgpu /usr/src/rgpu-vgpu-0.1.0
#   sudo dkms add rgpu-vgpu/0.1.0
#   sudo dkms build rgpu-vgpu/0.1.0
#   sudo dkms install rgpu-vgpu/0.1.0
#
# Removal:
#   sudo dkms remove rgpu-vgpu/0.1.0 --all

PACKAGE_NAME="rgpu-vgpu"
PACKAGE_VERSION="0.1.0"

BUILT_MODULE_NAME[0]="rgpu_vgpu"
BUILT_MODULE_LOCATION[0]=""
DEST_MODULE_LOCATION[0]="/extra"

MAKE[0]="make -C /lib/modules/${kernelver}/build M=${dkms_tree}/${PACKAGE_NAME}/${PACKAGE_VERSION}/build modules"
CLEAN="make -C /lib/modules/${kernelver}/build M=${dkms_tree}/${PACKAGE_NAME}/${PACKAGE_VERSION}/build clean"

AUTOINSTALL="yes"
