name: Release Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number (e.g., 0.1.0)'
        required: true
        default: '0.1.0'

env:
  CARGO_TERM_COLOR: always

jobs:
  # ─── Windows Installer ─────────────────────────
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: windows-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: windows-cargo-

      - name: Build release
        run: cargo build --release

      - name: Determine version
        id: version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "VERSION=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT
          fi

      - name: Install NSIS
        run: choco install nsis -y

      - name: Stage build artifacts
        shell: powershell
        run: |
          $staging = "packaging\windows\nsis\staging"
          New-Item -ItemType Directory -Force -Path $staging | Out-Null
          Copy-Item "target\release\rgpu.exe" "$staging\"
          Copy-Item "target\release\rgpu_cuda_interpose.dll" "$staging\"
          Copy-Item "target\release\rgpu_nvenc_interpose.dll" "$staging\"
          Copy-Item "target\release\rgpu_nvdec_interpose.dll" "$staging\"
          Copy-Item "target\release\rgpu_nvml_interpose.dll" "$staging\"
          Copy-Item "target\release\rgpu_nvapi_interpose.dll" "$staging\"
          Copy-Item "target\release\rgpu_vk_icd.dll" "$staging\"
          Copy-Item "packaging\config\rgpu.toml.template" "$staging\"
          Copy-Item "icon.ico" "$staging\"

      - name: Build NSIS installer
        run: |
          & "C:\Program Files (x86)\NSIS\makensis.exe" /DVERSION=${{ steps.version.outputs.VERSION }} packaging\windows\nsis\rgpu-installer.nsi

      # ─── MSI Installer (WiX v4) ──────────────────
      - name: Install .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Install WiX v4
        run: dotnet tool install --global wix

      - name: Install WiX extensions
        run: |
          wix extension add WixToolset.UI.wixext
          wix extension add WixToolset.Util.wixext

      - name: Stage build artifacts for MSI
        shell: powershell
        run: |
          $staging = "packaging\windows\msi\staging"
          New-Item -ItemType Directory -Force -Path $staging | Out-Null
          Copy-Item "target\release\rgpu.exe" "$staging\"
          Copy-Item "target\release\rgpu_cuda_interpose.dll" "$staging\"
          Copy-Item "target\release\rgpu_nvenc_interpose.dll" "$staging\"
          Copy-Item "target\release\rgpu_nvdec_interpose.dll" "$staging\"
          Copy-Item "target\release\rgpu_nvml_interpose.dll" "$staging\"
          Copy-Item "target\release\rgpu_nvapi_interpose.dll" "$staging\"
          Copy-Item "target\release\rgpu_vk_icd.dll" "$staging\"
          Copy-Item "packaging\config\rgpu.toml.template" "$staging\"
          Copy-Item "icon.ico" "$staging\"

      - name: Build MSI installer
        run: |
          wix build -d VERSION=${{ steps.version.outputs.VERSION }} -arch x64 -ext WixToolset.UI.wixext -ext WixToolset.Util.wixext -o packaging/windows/msi/rgpu-${{ steps.version.outputs.VERSION }}-windows-x64.msi packaging/windows/msi/rgpu.wxs

      - name: Upload Windows installers
        uses: actions/upload-artifact@v4
        with:
          name: rgpu-windows-x64
          path: |
            packaging/windows/nsis/rgpu-*-setup.exe
            packaging/windows/msi/rgpu-*.msi

  # ─── Linux Packages (.deb + .rpm) ──────────────
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libvulkan-dev \
            libxkbcommon-dev \
            libwayland-dev \
            libgl1-mesa-dev \
            libegl1-mesa-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: linux-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: linux-cargo-

      - name: Build release
        run: cargo build --release

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "VERSION=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT
          fi

      - name: Install packaging tools
        run: |
          cargo install cargo-deb --locked
          cargo install cargo-generate-rpm --locked

      - name: Clean old packages from cache
        run: |
          rm -f target/debian/*.deb
          rm -f target/generate-rpm/*.rpm

      - name: Build .deb package
        run: cargo deb -p rgpu-cli --no-build --deb-version ${{ steps.version.outputs.VERSION }}

      - name: Build .rpm package
        run: cargo generate-rpm -p crates/rgpu-cli --set-metadata 'version="${{ steps.version.outputs.VERSION }}"'

      - name: Stage container interpose libraries
        run: |
          mkdir -p container-libs
          cp target/release/librgpu_cuda_interpose.so container-libs/libcuda.so.1
          cp target/release/librgpu_nvml_interpose.so container-libs/libnvidia-ml.so.1
          cp target/release/librgpu_nvenc_interpose.so container-libs/libnvidia-encode.so.1
          cp target/release/librgpu_nvdec_interpose.so container-libs/libnvcuvid.so.1
          cp target/release/librgpu_vk_icd.so container-libs/librgpu_vk_icd.so
          cd container-libs
          ln -s libcuda.so.1 libcuda.so
          ln -s libnvidia-ml.so.1 libnvidia-ml.so
          ln -s libnvidia-encode.so.1 libnvidia-encode.so
          ln -s libnvcuvid.so.1 libnvcuvid.so
          cd ..
          tar czf rgpu-container-libs-linux-x64.tar.gz -C container-libs .

      - name: Upload Linux packages
        uses: actions/upload-artifact@v4
        with:
          name: rgpu-linux-x64
          path: |
            target/debian/*.deb
            target/generate-rpm/*.rpm
            rgpu-container-libs-linux-x64.tar.gz

  # ─── macOS Package (.pkg) ──────────────────────
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: macos-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: macos-cargo-

      - name: Build release
        run: cargo build --release

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "VERSION=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT
          fi

      - name: Clean old .pkg files from cache
        run: rm -f target/rgpu-*-macos-x64.pkg

      - name: Build .pkg installer
        run: |
          chmod +x packaging/macos/build-macos.sh
          packaging/macos/build-macos.sh --skip-build ${{ steps.version.outputs.VERSION }}

      - name: Upload macOS package
        uses: actions/upload-artifact@v4
        with:
          name: rgpu-macos-x64
          path: target/rgpu-*-macos-x64.pkg

  # ─── Create GitHub Release ─────────────────────
  release:
    needs: [build-windows, build-linux, build-macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f | head -20

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/**/*.exe
            artifacts/**/*.msi
            artifacts/**/*.deb
            artifacts/**/*.rpm
            artifacts/**/*.pkg
            artifacts/**/*.tar.gz
          generate_release_notes: true
          draft: false
          prerelease: false
